version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sms_postgres
    environment:
      POSTGRES_USER: sms_user
      POSTGRES_PASSWORD: sms_password
      POSTGRES_DB: sms_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sms_user -d sms_db']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sms_backend
    environment:
      DATABASE_URL: postgresql://sms_user:sms_password@postgres:5432/sms_db
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-in-production
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: your-email@gmail.com
      SMTP_PASS: your-app-password
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sms_frontend
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  postgres_data:
